<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="header">
      <h1 class="title">Tic-Tac-Toe</h1>
      <p class="subtitle">Two players · X goes first</p>
    </header>

    <section class="scoreboard" aria-label="Player scores">
      <div class="player-card player-x" id="player-x-card">
        <span class="player-mark">X</span>
        <span class="player-label">Player 1</span>
      </div>
      <div class="player-card player-o" id="player-o-card">
        <span class="player-mark">O</span>
        <span class="player-label">Player 2</span>
      </div>
    </section>

    <p class="status" id="status" role="status" aria-live="polite">Player X's turn</p>

    <div class="board" id="board" role="grid" aria-label="Tic-tac-toe board">
      <button class="cell" type="button" data-index="0" role="gridcell" aria-label="Cell 1, empty"></button>
      <button class="cell" type="button" data-index="1" role="gridcell" aria-label="Cell 2, empty"></button>
      <button class="cell" type="button" data-index="2" role="gridcell" aria-label="Cell 3, empty"></button>
      <button class="cell" type="button" data-index="3" role="gridcell" aria-label="Cell 4, empty"></button>
      <button class="cell" type="button" data-index="4" role="gridcell" aria-label="Cell 5, empty"></button>
      <button class="cell" type="button" data-index="5" role="gridcell" aria-label="Cell 6, empty"></button>
      <button class="cell" type="button" data-index="6" role="gridcell" aria-label="Cell 7, empty"></button>
      <button class="cell" type="button" data-index="7" role="gridcell" aria-label="Cell 8, empty"></button>
      <button class="cell" type="button" data-index="8" role="gridcell" aria-label="Cell 9, empty"></button>
    </div>

    <button class="reset-btn" id="reset-btn" type="button">Reset Game</button>
  </main>

  <script src="script.js"></script>
</body>
</html>
